---
layout: default
---

<article class="section">
  <div class="container">
    <header class="post-header">
      <h1 class="post-title">{{ page.title }}</h1>
      <time class="post-date" datetime="{{ page.date | date: '%Y-%m-%d' }}">
        {{ page.date | date: "%B %e, %Y" }}
      </time>
    </header>
    <div class="content">
      {{ content }}
    </div>
  </div>
</article>
