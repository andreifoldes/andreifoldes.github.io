---
layout: page
title: Blog
---

{% for post in site.posts %}
  <article class="post-preview">
    <time class="post-preview-date" datetime="{{ post.date | date: '%Y-%m-%d' }}">
      {{ post.date | date: "%B %e, %Y" }}
    </time>
    <h3 class="post-preview-title">
      <a href="{{ post.url }}">{{ post.title }}</a>
    </h3>
  </article>
{% endfor %}
